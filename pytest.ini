# YOLO Auto-Training System Test Configuration

[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Mock settings
addopts = --strict-markers --tb=short -v

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    requires_api: Tests requiring external API access
