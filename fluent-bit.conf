# Fluent Bit configuration for YOLO Auto-Training
# Parses and forwards JSON logs from YOLO API services

[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Health_Check  On

# Input: Read from docker logs
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines  On
    DB                /var/log/flb_ko.db

# Input: Read from JSON log files (if mounted)
[INPUT]
    Name              tail
    Path              /var/log/yolo/*.log
    Parser            json
    Tag               yolo.*
    Refresh_Interval  5

# Filter: Add Kubernetes metadata (if running in K8s)
[FILTER]
    Name                kubernetes
    Match               docker.*
    Kube_CA_File       /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File    /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_URL           https://kubernetes.default.svc:443
    Merge_Log          On
    Merge_Log_Key      log_processed
    K8S-Logging.Parser On
    K8S-Logging.Exclude On

# Filter: Parse JSON logs from YOLO services
[FILTER]
    Name                parser
    Match                yolo.*
    Key_Name            log
    Parser              json
    Reserve_Data        On

# Filter: Add service name and environment
[FILTER]
    Name                modify
    Match               *
    Add                source yolo-auto-training
    Add                environment production

# Output: Send to Elasticsearch
[OUTPUT]
    Name            es
    Match           *
    Host            elasticsearch
    Port            9200
    HTTP_User       elastic
    HTTP_Passwd     changeme
    Logstash_Format On
    Logstash_Prefix yolo-logs
    Replace_Dots    On
    Retry_Limit     False
    Suppress_Type_Name On

# Output: Also send to stdout for debugging
[OUTPUT]
    Name            stdout
    Match           *
    Format          json_lines
