# Alertmanager configuration for YOLO Auto-Training

global:
  resolve_timeout: 5m

# Route defines how alerts are grouped and sent
route:
  group_by: ['alertname', 'cluster']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

# Receivers define notification destinations
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://webhook:5000/alert'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://webhook:5000/alert/critical'
        send_resolved: true
    # Add email/slack/pagerduty configs here for production

  - name: 'warning'
    webhook_configs:
      - url: 'http://webhook:5000/alert/warning'
        send_resolved: true

# Inhibit rules prevent redundant alerts
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster']
