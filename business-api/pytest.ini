[pytest]
# Business API Test Configuration

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# Coverage
addopts = -v --cov=src --cov-report=term-missing

# Asyncio
asyncio_mode = auto
