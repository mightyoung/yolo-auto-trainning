version: '3.8'

services:
  # Redis service
  redis:
    image: redis:7-alpine
    container_name: yolo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - yolo-network
    deploy:
      resources:
        limits:
          memory: 512M

  # FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:3000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme}
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./data:/data
      - ./runs:/runs
      - ./models:/models
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - yolo-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
      restart_policy:
        condition: on-failure

  # Celery worker for training tasks (GPU-enabled)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-celery-worker
    runtime: nvidia
    command: celery -A src.api.tasks worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./data:/data
      - ./runs:/runs
      - ./models:/models
    depends_on:
      - redis
    networks:
      - yolo-network
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4'
        reservations:
          memory: 8G
          cpus: '2'
      restart_policy:
        condition: on-failure

  # Celery beat for periodic tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-celery-beat
    command: celery -A src.api.tasks beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - yolo-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  yolo-network:
    driver: bridge

volumes:
  redis_data:
