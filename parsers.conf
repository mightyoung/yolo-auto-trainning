# Fluent Bit parsers configuration

[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

[PARSER]
    Name        json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        regex
    Format      regex
    Regex       ^(?<timestamp>[^ ]+) (?<level>[^ ]+) (?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S

[PARSER]
    Name        syslog
    Format      syslog
    Regex       ^(?<timestamp>[^ ]+ [^ ]+) (?<hostname>[^ ]+) (?<ident>[^ ]+): (?<message>.*)$
    Time_Key    timestamp
    Time_Format %b %d %H:%M:%S
